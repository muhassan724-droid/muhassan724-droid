  <!-- Stack line 1 -->
  <text x="103" y="304"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="15"
    font-weight="400"
    fill="#ffffff"
    letter-spacing="3"
    opacity="0.3">Claude Ecosystem · Lovable + Supabase</text>

  <!-- Year mark -->
  <text x="1128" y="352"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#ffffff"
    letter-spacing="2"
