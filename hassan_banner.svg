<svg width="1200" height="400" viewBox="0 0 1200 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Hassan — AI Agents · SaaS Platforms · Automation Systems</title>
  <desc>Minimal brutalist GitHub profile banner</desc>

  <rect width="1200" height="400" fill="#000000"/>

  <!-- Left vertical rule -->
  <line x1="72" y1="72" x2="72" y2="328" stroke="#ffffff" stroke-width="5"/>

  <!-- Name -->
  <text x="100" y="190"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="120"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-4">HASSAN</text>

  <!-- Divider -->
  <line x1="100" y1="220" x2="1060" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Tagline -->
  <text x="103" y="262"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#ffffff"
